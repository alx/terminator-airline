<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PONG 1D — Pancarte A4</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  @page {
    size: A4;
    margin: 0;
  }

  body {
    width: 210mm;
    height: 297mm;
    background: #fff;
    color: #000;
    font-family: 'Press Start 2P', 'Courier New', monospace;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .page {
    width: 190mm;
    height: 277mm;
    border: 6px solid #000;
    padding: 10mm;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    position: relative;
  }

  /* Pixel corner decorations */
  .corner {
    position: absolute;
    width: 16px;
    height: 16px;
    background: #000;
  }
  .corner.tl { top: -3px; left: -3px; }
  .corner.tr { top: -3px; right: -3px; }
  .corner.bl { bottom: -3px; left: -3px; }
  .corner.br { bottom: -3px; right: -3px; }

  /* Pixel border dashes */
  .pixel-border-top, .pixel-border-bottom {
    position: absolute;
    left: 20px;
    right: 20px;
    height: 4px;
    background: repeating-linear-gradient(
      90deg,
      #000 0px, #000 8px,
      transparent 8px, transparent 14px
    );
  }
  .pixel-border-top { top: 6px; }
  .pixel-border-bottom { bottom: 6px; }

  /* ASCII art pong top */
  .ascii-game {
    font-family: 'Courier New', monospace;
    font-size: 9pt;
    line-height: 1.3;
    letter-spacing: 0.05em;
    text-align: center;
    border: 3px solid #000;
    padding: 8px 16px;
    background: #fff;
    width: 100%;
    margin-bottom: 6mm;
  }

  /* Main title */
  .title-block {
    text-align: center;
    width: 100%;
  }

  .insert-coin {
    font-size: 7pt;
    letter-spacing: 0.2em;
    margin-bottom: 4mm;
    border: 2px solid #000;
    padding: 3px 10px;
    display: inline-block;
  }

  .main-title {
    font-size: 42pt;
    font-weight: normal;
    letter-spacing: 0.05em;
    line-height: 1;
    margin-bottom: 4mm;
    text-shadow: 4px 4px 0px #000;
    -webkit-text-stroke: 1px #000;
  }

  .subtitle {
    font-size: 8pt;
    line-height: 1.8;
    letter-spacing: 0.05em;
    max-width: 150mm;
    margin: 0 auto;
    border-top: 3px solid #000;
    border-bottom: 3px solid #000;
    padding: 6px 0;
  }

  /* Score display */
  .score-display {
    display: flex;
    justify-content: center;
    gap: 20mm;
    font-size: 28pt;
    border: 4px solid #000;
    padding: 6mm 12mm;
    width: 100%;
    align-items: center;
  }
  .score-label { font-size: 7pt; }
  .score-vs { font-size: 14pt; }

  /* QR + Info block */
  .info-block {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    gap: 8mm;
    border: 4px solid #000;
    padding: 6mm;
  }

  .qr-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3mm;
    flex-shrink: 0;
  }

  .qr-area img {
    width: 45mm;
    height: 45mm;
    image-rendering: pixelated;
    border: 3px solid #000;
    padding: 2px;
  }

  .qr-label {
    font-size: 6pt;
    text-align: center;
    letter-spacing: 0.1em;
  }

  .contact-info {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 5mm;
  }

  .contact-row {
    display: flex;
    align-items: flex-start;
    gap: 4mm;
    font-size: 7pt;
    line-height: 1.7;
    border-bottom: 2px dotted #000;
    padding-bottom: 4mm;
  }
  .contact-row:last-child { border-bottom: none; padding-bottom: 0; }

  .contact-icon {
    font-size: 11pt;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .contact-label {
    font-size: 5.5pt;
    opacity: 0.6;
    display: block;
    margin-bottom: 2px;
  }
  .contact-value {
    font-size: 8pt;
    word-break: break-all;
  }

  /* Bottom bar */
  .bottom-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    font-size: 6pt;
    letter-spacing: 0.15em;
  }

  .pixel-lives {
    font-size: 10pt;
    letter-spacing: 0.3em;
  }

  @media print {
    body { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
  }
</style>
</head>
<body>
<div class="page">
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>
  <div class="pixel-border-top"></div>
  <div class="pixel-border-bottom"></div>

  <!-- Title Block -->
  <div class="title-block">
    <div class="insert-coin">► INSERT COIN ◄</div>
    <div class="main-title">PONG 1D</div>
    <div class="subtitle">LUMINOUS PING PONG GAME<br>POWERED BY LEDs</div>
  </div>

  <!-- QR + Contact -->
  <div class="info-block">
    <div class="qr-area">
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=http://alx.github.io/pong1D/&color=000000&bgcolor=ffffff&qzone=1&format=png" alt="QR Code" />
      <div class="qr-label">SCAN TO PLAY</div>
    </div>

    <div class="contact-info">
      <div class="contact-row">
        <div class="contact-icon">🌐</div>
        <div>
          <span class="contact-label">WEBSITE</span>
          <span class="contact-value">alx.github.io/pong1D</span>
        </div>
      </div>
      <div class="contact-row">
        <div class="contact-icon">📱</div>
        <div>
          <span class="contact-label">WHATSAPP / TEL</span>
          <span class="contact-value">+66 811 640 400</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Bottom bar -->
  <div class="bottom-bar">
    <div class="pixel-lives">♥ ♥ ♥</div>
    <div>© PONG 1D — ALL RIGHTS RESERVED</div>
    <div class="pixel-lives">♥ ♥ ♥</div>
  </div>

</div>
</body>
</html>
