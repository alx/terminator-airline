<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PONG 1D — Pancarte A4</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  @page { size: A4; margin: 0; }

  body {
    width: 210mm;
    height: 297mm;
    background: #fff;
    color: #000;
    font-family: 'Press Start 2P', 'Courier New', monospace;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .page {
    width: 186mm;
    height: 273mm;
    border: 6px solid #000;
    padding: 10mm 12mm;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    position: relative;
  }

  /* Pixel corners */
  .corner {
    position: absolute;
    width: 18px;
    height: 18px;
    background: #000;
  }
  .corner.tl { top: -3px; left: -3px; }
  .corner.tr { top: -3px; right: -3px; }
  .corner.bl { bottom: -3px; left: -3px; }
  .corner.br { bottom: -3px; right: -3px; }

  /* Pixel dashed borders */
  .pixel-border-top, .pixel-border-bottom {
    position: absolute;
    left: 24px; right: 24px;
    height: 4px;
    background: repeating-linear-gradient(90deg, #000 0px, #000 10px, transparent 10px, transparent 18px);
  }
  .pixel-border-top { top: 7px; }
  .pixel-border-bottom { bottom: 7px; }

  /* INSERT COIN */
  .insert-coin {
    font-size: 9pt;
    letter-spacing: 0.25em;
    border: 3px solid #000;
    padding: 5px 16px;
    display: inline-block;
  }

  /* Main title */
  .main-title {
    font-size: 58pt;
    font-weight: normal;
    letter-spacing: 0.06em;
    line-height: 1;
    text-shadow: 6px 6px 0px #555;
  }

  /* Subtitle */
  .subtitle {
    font-size: 11pt;
    line-height: 2;
    letter-spacing: 0.08em;
    text-align: center;
    border-top: 4px solid #000;
    border-bottom: 4px solid #000;
    padding: 8px 0;
    width: 100%;
  }

  /* Divider */
  .divider {
    width: 100%;
    height: 4px;
    background: repeating-linear-gradient(90deg, #000 0px, #000 10px, transparent 10px, transparent 18px);
  }

  /* QR Code */
  .qr-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4mm;
  }

  .qr-area img {
    width: 62mm;
    height: 62mm;
    image-rendering: pixelated;
    border: 4px solid #000;
    padding: 3px;
  }

  .qr-label {
    font-size: 8pt;
    letter-spacing: 0.2em;
  }

  /* Contact rows */
  .contact-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5mm;
    width: 100%;
  }

  .contact-row {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    width: 100%;
    padding: 4mm 0;
    border-bottom: 2px dotted #000;
  }
  .contact-row:last-child { border-bottom: none; }

  .contact-label {
    font-size: 7pt;
    letter-spacing: 0.2em;
    opacity: 0.55;
  }

  .contact-value {
    font-size: 13pt;
    letter-spacing: 0.05em;
    word-break: break-all;
    text-align: center;
  }

  .pixel-lives {
    font-size: 12pt;
    letter-spacing: 0.4em;
  }

  @media print {
    body { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
  }
</style>
</head>
<body>
<div class="page">
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>
  <div class="pixel-border-top"></div>
  <div class="pixel-border-bottom"></div>

  <!-- Insert coin -->
  <div class="insert-coin">► INSERT COIN ◄</div>

  <!-- Main title -->
  <div class="main-title">PONG 1D</div>

  <!-- Subtitle -->
  <div class="subtitle">
    LUMINOUS PING PONG GAME<br>POWERED BY LEDs
  </div>

  <!-- QR Code -->
  <div class="qr-area">
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=http://alx.github.io/pong1D/&color=000000&bgcolor=ffffff&qzone=2&format=png" alt="QR Code" />
    <div class="qr-label">▶ SCAN TO PLAY ◀</div>
  </div>

  <!-- Contact info — same column -->
  <div class="contact-block">
    <div class="contact-row">
      <span class="contact-label">WEBSITE</span>
      <span class="contact-value">alx.github.io/pong1D</span>
    </div>
    <div class="contact-row">
      <span class="contact-label">WHATSAPP / TEL</span>
      <span class="contact-value">+66 811 640 400</span>
    </div>
  </div>

  <!-- Bottom bar -->
  <div style="display:flex;justify-content:center;width:100%;">
    <div class="pixel-lives">♥ ♥ ♥</div>
  </div>

</div>
</body>
</html>
