baseURL = "https://alx.github.io/terminator-airline/"
languageCode = "en"
title = "Terminator Airline"
theme = "PaperMod"

[pagination]
  pagerSize = 20

[minify]
  disableXML = true
  minifyOutput = true

[params]
  env = "production"
  title = "Terminator Airline"
  description = "Find flights along the solar terminator line — book the right seat for golden hour at 35,000 ft."
  keywords = ["flight", "terminator line", "golden hour", "sunset flight", "airplane photography", "South East Asia flights"]
  author = "Alex"
  defaultTheme = "dark"
  disableThemeToggle = false
  ShowReadingTime = false
  ShowShareButtons = false
  ShowPostNavLinks = false
  ShowBreadCrumbs = false
  ShowCodeCopyButtons = true
  ShowToc = false
  disableHugoGeneratorInject = true

  [params.assets]
    disableFingerprinting = false

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/alx/terminator-airline"

[menu]
  [[menu.main]]
    identifier = "flights"
    name = "✈️ Flights"
    url = "/flights/"
    weight = 10
  [[menu.main]]
    identifier = "how"
    name = "How it works"
    url = "/how-it-works/"
    weight = 20
  [[menu.main]]
    identifier = "api"
    name = "API"
    url = "/api/"
    weight = 25
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 30

[outputs]
  home = ["HTML", "RSS", "JSON"]
